name: Run govulncheck

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Scan with the latest patch of the Go version the project is shipped with.
      # Using the minimum version from go.mod leads to false positives.
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          ./scripts/govulncheck.sh
